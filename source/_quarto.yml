project:
  type: website
  output-dir: ../docs

website:
  title: "Chris Kornaros"
  twitter-card: true
  open-graph: true
  google-analytics: 
    tracking-id: "G-J1EQMCS7CC"
    anonymize-ip: true
  cookie-consent: 
    type: express
    style: headline
    palette: dark
  repo-url: https://github.com/ChrisKornaros/ChrisKornaros.github.io
  repo-actions: [source, issue]
  page-footer: 
    background: danger
    center:
      - icon: github
        text: GitHub
        href: https://www.github.com/ChrisKornaros
      - icon: linkedin
        text: LinkedIn
        href: https://www.linkedin.com/in/chris-kornaros
      - text: Bluesky
        href: https://bsky.app/profile/chriskornaros.bsky.social
      - icon: envelope-arrow-up-fill
        text: Email
        href: https://forms.gle/gDEjGD9G6VkaxkWX6 
  navbar:
    search: true
    background: danger
    foreground: light
    # Top-level links only; per-post discovery is handled by the listing pages
    # and the directory-auto sidebars below, so publishing never edits this file.
    left:
      - text: "Home"
        href: index.qmd
      - text: "About"
        href: pages/about/about.qmd
      - text: "Guides"
        href: pages/guides/guides.qmd
      - text: "Research"
        href: pages/research/research.qmd
      - text: "Blogs"
        href: pages/blogs/blogs.qmd
      - text: "Recipes"
        href: pages/recipes/recipes.qmd

  # Sidebars auto-list a directory (not hand-listed posts) so a freshly published
  # file appears automatically -- no _quarto.yml edit per publish. NOTE: use a
  # directory path (e.g. "pages/guides/posts"); bare globs like ".../*.qmd" render
  # as literal text in Quarto 1.9, and `auto:` on an empty/missing dir aborts render.
  # Each section's sidebar is attached to its posts by a pages/<section>/_metadata.yml
  # (`sidebar: <id>`), so the nav persists when a reader opens an individual post.
  sidebar:
    - id: guides
      title: "Guides"
      style: "docked"
      background: dark
      foreground: light
      collapse-level: 2
      contents:
        - section: "Guides"
          href: pages/guides/guides.qmd
          contents: "pages/guides/posts"

    - id: research
      title: "Research"
      style: "docked"
      background: dark
      foreground: light
      collapse-level: 2
      contents:
        - section: "Research"
          href: pages/research/research.qmd
          # No posts yet; add `- auto: "/pages/research/posts/*.qmd"` once
          # pages/research/posts/ has content (an empty auto: glob crashes render).

    - id: blogs
      title: "Blogs"
      style: "docked"
      background: dark
      foreground: light
      collapse-level: 2
      contents:
        - section: "Blogs"
          href: pages/blogs/blogs.qmd
          contents: "pages/blogs/posts"

    - id: recipes
      title: "Recipes"
      style: "docked"
      background: dark
      foreground: light
      collapse-level: 2
      # Directory auto-listing: the landing page plus every category folder (each a
      # collapsible sub-section with its recipes). A bare glob like
      # `pages/recipes/*/index.qmd` renders as literal text in Quarto 1.9; a directory
      # path expands correctly. Listed at top level (no wrapper section) to avoid a
      # redundant "Recipes" nesting.
      contents: "pages/recipes"

format:
  html:
    toc: true
    toc-title: "On this page"
    toc-depth: 4
    theme:
      light: brand/light.scss
      dark: brand/dark.scss